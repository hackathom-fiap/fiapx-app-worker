      #     path: ~/.sonar/cache 
      #     key: ${{ runner.os }}-sonar
      #     restore-keys: ${{ runner.os }}-sonar 
      # - name: Cache de pacotes Maven 
      #   uses: actions/cache@v4
      #   with: 
      #     path: ~/.m2/
      #     key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }} 
      #     restore-keys: ${{ runner.os }}-m2
      # - name: Corrigir encoding de arquivos properties
      #   run: |
      #     find app-customer/src/main/resources -name "*.properties" -type f -exec sh -c 'iconv -f ISO-8859-1 -t UTF-8 "$1" > "$1.tmp" && mv "$1.tmp" "$1"' _ {} \; || true
  
      # - name: Build and analyze Sonar
      #   env: 
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 

      #   run: mvn -f app-customer/pom.xml -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=TechFiap_soat-tech-challenge4-app-customer

           
  create_pull_request:  
    runs-on: ubuntu-latest
    needs: sonar_analyse     
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        
      - name: Criar Pull Request para develop
        uses: repo-sync/pull-request@v2
        with:
          source_branch: ${{ github.ref_name }}
          destination_branch: "main"
          pr_title: "PR aberto automaticamente: ${{ github.ref_name }} -> to main"
          pr_body: |
            Build da aplicação Java concluído com sucesso.
            O PR está pronto para revisão.
          pr_label: "automação"
          github_token: ${{ secrets.GITHUB_TOKEN }}
